services:
  shorth-postgres-db:
    image: postgres:latest
    container_name: shorth-postgres-db
    env_file:
      - ./backend/.env
    ports:
      - "5432:5432"
    volumes:
      - postgres-volume:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  shorth-redis:
    image: redis:trixie
    container_name: shorth-redis
    env_file:
      - ./backend/.env
    command: ["sh", "-c", "redis-server --requirepass \"$$REDIS_PASSWORD\""]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping | grep PONG"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./backend
      dockerfile: Api/Dockerfile
    container_name: shorth-api
    env_file:
      - ./backend/.env
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
    ports:
      - "5050:8080"
    depends_on:
      shorth-postgres-db:
        condition: service_healthy
      shorth-redis:
        condition: service_healthy

  worker:
    build:
      context: ./backend
      dockerfile: Worker/Dockerfile
    container_name: shorth-worker
    env_file:
      - ./backend/.env
    environment:
      DOTNET_ENVIRONMENT: Development
    depends_on:
      shorth-postgres-db:
        condition: service_healthy
      shorth-redis:
        condition: service_healthy

volumes:
  postgres-volume:
    external: true
